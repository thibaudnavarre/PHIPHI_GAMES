<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#11111d"/>
  <!-- 3x3 sudoku grid suggestion -->
  <g fill="none" stroke="#2a2a45" stroke-width="6">
    <rect x="64" y="64" width="384" height="384" rx="12"/>
    <!-- vertical dividers -->
    <line x1="192" y1="64" x2="192" y2="448"/>
    <line x1="320" y1="64" x2="320" y2="448"/>
    <!-- horizontal dividers -->
    <line x1="64" y1="192" x2="448" y2="192"/>
    <line x1="64" y1="320" x2="448" y2="320"/>
  </g>
  <!-- T-piece in orange-red -->
  <g fill="#E8441A">
    <rect x="80" y="208" width="96" height="96" rx="8"/>
    <rect x="208" y="208" width="96" height="96" rx="8"/>
    <rect x="336" y="208" width="96" height="96" rx="8"/>
    <rect x="208" y="336" width="96" height="96" rx="8"/>
  </g>
</svg>

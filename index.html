<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>SudoCul</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- ── MENU ─────────────────────────────────────────────────── -->
    <div id="menu">
      <h1 class="menu-title">PHIPHI<br />GAMES</h1>
      <div id="game-grid">
        <button class="game-tile" id="tile-sudocul">
          <svg
            class="tile-icon"
            viewBox="0 0 80 80"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect width="80" height="80" rx="12" fill="#1c1c2e" />
            <g fill="#E8441A">
              <rect x="10" y="34" width="18" height="18" rx="3" />
              <rect x="31" y="34" width="18" height="18" rx="3" />
              <rect x="52" y="34" width="18" height="18" rx="3" />
              <rect x="31" y="55" width="18" height="18" rx="3" />
            </g>
          </svg>
          <span class="tile-name">SudoCul</span>
        </button>
        <div class="game-tile coming-soon">
          <svg
            class="tile-icon"
            viewBox="0 0 80 80"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect width="80" height="80" rx="12" fill="#1c1c2e" />
            <text
              x="40"
              y="48"
              text-anchor="middle"
              font-size="28"
              fill="#2a2a45"
            >
              ?
            </text>
          </svg>
          <span class="tile-name">Coming Soon</span>
        </div>
        <div class="game-tile coming-soon">
          <svg
            class="tile-icon"
            viewBox="0 0 80 80"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect width="80" height="80" rx="12" fill="#1c1c2e" />
            <text
              x="40"
              y="48"
              text-anchor="middle"
              font-size="28"
              fill="#2a2a45"
            >
              ?
            </text>
          </svg>
          <span class="tile-name">Coming Soon</span>
        </div>
      </div>
    </div>

    <!-- ── GAME ──────────────────────────────────────────────────── -->
    <div id="app" class="hidden">
      <button id="menu-btn" aria-label="Back to menu">&#8592;</button>
      <header id="header">
        <div class="score-box">
          <span class="score-label">SCORE</span>
          <span id="score">0</span>
        </div>
        <h1 class="title">SudoCul</h1>
        <div class="score-box">
          <span class="score-label">BEST</span>
          <span id="best-score">0</span>
        </div>
      </header>

      <div id="grid-wrapper">
        <div id="grid"></div>
      </div>

      <div id="tray">
        <p class="tray-label">NEXT PIECE</p>
        <div id="current-piece"></div>
      </div>
    </div>

    <div id="game-over-overlay" class="hidden">
      <div class="modal">
        <h2>Game Over</h2>
        <p class="final-label">SCORE</p>
        <p id="final-score" class="final-value">0</p>
        <button id="restart-btn">Play Again</button>
        <button id="goto-menu-btn">Menu</button>
      </div>
    </div>

    <div id="score-popup" class="hidden">+0</div>

    <script type="module" src="js/game.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
      }
    </script>
  </body>
</html>

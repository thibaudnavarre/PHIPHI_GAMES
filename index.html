<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>PHIPHI GAMES</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/sudocul.css" />
    <link rel="stylesheet" href="css/freecul.css" />
    <link rel="stylesheet" href="css/lightcul.css" />
    <link rel="stylesheet" href="css/mergcul.css" />
  </head>
  <body>
    <!-- ── MENU ─────────────────────────────────────────────────── -->
    <div id="menu">
      <h1 class="menu-title">PHIPHI<br />GAMES</h1>
      <div id="game-grid">
        <button class="game-tile" id="tile-sudocul">
          <svg
            class="tile-icon"
            viewBox="0 0 80 80"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect width="80" height="80" rx="12" fill="#1c1c2e" />
            <g fill="#E8441A">
              <rect x="10" y="34" width="18" height="18" rx="3" />
              <rect x="31" y="34" width="18" height="18" rx="3" />
              <rect x="52" y="34" width="18" height="18" rx="3" />
              <rect x="31" y="55" width="18" height="18" rx="3" />
            </g>
          </svg>
          <span class="tile-name">SudoCul</span>
        </button>
        <button class="game-tile" id="tile-freecul">
          <svg
            class="tile-icon"
            viewBox="0 0 80 80"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect width="80" height="80" rx="12" fill="#1c1c2e" />
            <rect x="10" y="16" width="22" height="30" rx="4" fill="#f0f0f0" />
            <text
              x="21"
              y="36"
              text-anchor="middle"
              font-size="14"
              font-weight="bold"
              fill="#cc2222"
            >
              ♥
            </text>
            <rect x="48" y="34" width="22" height="30" rx="4" fill="#f0f0f0" />
            <text
              x="59"
              y="54"
              text-anchor="middle"
              font-size="14"
              font-weight="bold"
              fill="#1a1a8a"
            >
              ♠
            </text>
          </svg>
          <span class="tile-name">FreeCul</span>
        </button>
        <button class="game-tile" id="tile-lightcul">
          <svg
            class="tile-icon"
            viewBox="0 0 80 80"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect width="80" height="80" rx="12" fill="#1c1c2e" />
            <path
              d="M0,40 H46 V20 H72"
              stroke="rgba(255,214,0,0.25)"
              stroke-width="9"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M0,40 H46 V20 H72"
              stroke="#FFD600"
              stroke-width="2.5"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <line
              x1="38"
              y1="48"
              x2="54"
              y2="32"
              stroke="#FFD600"
              stroke-width="3"
              stroke-linecap="round"
            />
            <line
              x1="38"
              y1="28"
              x2="54"
              y2="12"
              stroke="#FFD600"
              stroke-width="3"
              stroke-linecap="round"
            />
          </svg>
          <span class="tile-name">LightCul</span>
        </button>
        <button class="game-tile" id="tile-mergcul">
          <svg
            class="tile-icon"
            viewBox="0 0 80 80"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect width="80" height="80" rx="12" fill="#1c1c2e" />
            <rect x="8" y="27" width="22" height="22" rx="4" fill="#3B9EFF" />
            <text
              x="19"
              y="43"
              text-anchor="middle"
              font-size="13"
              font-weight="bold"
              fill="#fff"
            >
              2
            </text>
            <rect x="35" y="15" width="22" height="22" rx="4" fill="#28D97C" />
            <text
              x="46"
              y="31"
              text-anchor="middle"
              font-size="13"
              font-weight="bold"
              fill="#fff"
            >
              3
            </text>
            <rect x="50" y="38" width="22" height="22" rx="4" fill="#FF8C00" />
            <text
              x="61"
              y="54"
              text-anchor="middle"
              font-size="13"
              font-weight="bold"
              fill="#fff"
            >
              4
            </text>
            <path
              d="M30,38 Q37,30 35,26"
              stroke="#ffffff44"
              stroke-width="2"
              fill="none"
              stroke-linecap="round"
              marker-end="url(#arr)"
            />
          </svg>
          <span class="tile-name">MergCul</span>
        </button>
      </div>
      <button id="update-btn" class="hidden" aria-label="Update available">
        &#x2B06; Update available
      </button>
    </div>

    <!-- ── SUDOCUL ─────────────────────────────────────────────── -->
    <div id="app-sudocul" class="hidden">
      <button id="menu-btn-sudocul" aria-label="Back to menu">&#8592;</button>
      <header id="header-sudocul">
        <div class="score-box">
          <span class="score-label">SCORE</span>
          <span id="score-sudocul">0</span>
        </div>
        <h1 class="title">SudoCul</h1>
        <div class="score-box">
          <span class="score-label">BEST</span>
          <span id="best-sudocul">0</span>
        </div>
      </header>

      <div id="grid-wrapper">
        <div id="grid"></div>
      </div>

      <div id="tray">
        <p class="tray-label">NEXT PIECE</p>
        <div id="current-piece"></div>
      </div>
    </div>

    <div id="game-over-sudocul" class="hidden">
      <div class="modal">
        <h2>Game Over</h2>
        <p class="final-label">SCORE</p>
        <p id="final-score-sudocul" class="final-value">0</p>
        <button id="restart-sudocul">Play Again</button>
        <button id="goto-menu-sudocul">Menu</button>
      </div>
    </div>

    <div id="score-popup-sudocul" class="hidden">+0</div>

    <!-- ── FREECUL ──────────────────────────────────────────────── -->
    <div id="app-freecul" class="hidden">
      <button id="menu-btn-freecul" aria-label="Back to menu">&#8592;</button>
      <header id="header-freecul">
        <div class="score-box fc-score-box">
          <span class="score-label">MOVES</span>
          <span id="moves-freecul">0</span>
        </div>
        <h1 class="fc-title">FreeCul</h1>
        <div class="score-box fc-score-box">
          <span class="score-label">BEST</span>
          <span id="best-freecul">-</span>
        </div>
      </header>
      <div id="freecul-board"></div>
    </div>

    <div id="game-over-freecul" class="hidden">
      <div class="modal">
        <h2 id="fc-result-title">You Win!</h2>
        <p class="final-label">MOVES</p>
        <p id="final-moves-freecul" class="final-value">0</p>
        <button id="restart-freecul">Play Again</button>
        <button id="goto-menu-freecul">Menu</button>
      </div>
    </div>

    <!-- ── LIGHTCUL ────────────────────────────────────────── -->
    <div id="app-lightcul" class="hidden">
      <button id="menu-btn-lightcul" aria-label="Back to menu">&#8592;</button>
      <header id="header-lightcul">
        <div class="score-box">
          <span class="score-label">SCORE</span>
          <span id="score-lightcul">0</span>
        </div>
        <h1 class="lc-title">LightCul</h1>
        <div class="score-box">
          <span class="score-label">TURNS</span>
          <span id="turns-lightcul">49</span>
        </div>
      </header>

      <div id="grid-wrapper-lightcul">
        <div id="grid-lightcul"></div>
      </div>

      <div id="tray-lightcul">
        <p class="lc-tray-label">Next Mirror</p>
        <div id="current-tile-lightcul"></div>
      </div>
    </div>

    <div id="game-over-lightcul" class="hidden">
      <div class="modal">
        <h2>Game Over</h2>
        <p class="final-label">SCORE</p>
        <p class="final-value">0</p>
        <button id="restart-lightcul">Play Again</button>
        <button id="goto-menu-lightcul">Menu</button>
      </div>
    </div>

    <div id="score-popup-lightcul" class="hidden">+0</div>

    <!-- ── MERGCUL ─────────────────────────────────────────────── -->
    <div id="app-mergcul" class="hidden">
      <button id="menu-btn-mergcul" aria-label="Back to menu">&#8592;</button>
      <header id="header-mergcul">
        <div class="score-box">
          <span class="score-label">SCORE</span>
          <span id="score-mergcul">0</span>
        </div>
        <h1 class="mc-title">MergCul</h1>
        <div class="score-box">
          <span class="score-label">BEST</span>
          <span id="best-mergcul">0</span>
        </div>
      </header>

      <div id="grid-wrapper-mergcul">
        <div id="grid-mergcul"></div>
      </div>
    </div>

    <div id="game-over-mergcul" class="hidden">
      <div class="modal">
        <h2>Game Over</h2>
        <p class="final-label">SCORE</p>
        <p class="final-value">0</p>
        <button id="restart-mergcul">Play Again</button>
        <button id="goto-menu-mergcul">Menu</button>
      </div>
    </div>

    <div id="score-popup-mergcul" class="hidden">+0</div>

    <script type="module" src="js/menu.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
      }
    </script>
  </body>
</html>
